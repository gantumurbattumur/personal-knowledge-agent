<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 420px;
            min-height: 300px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            background: #fafafa;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #2563eb;
            color: #fff;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
        }

        #status-dot.online {
            background: #22c55e;
        }

        #status-dot.offline {
            background: #ef4444;
        }

        .input-area {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        #context-bar {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #query-form {
            display: flex;
            gap: 8px;
        }

        #query-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        #query-input:focus {
            border-color: #2563eb;
        }

        #submit-btn {
            padding: 8px 16px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        #submit-btn:hover {
            background: #1d4ed8;
        }

        #submit-btn:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .results-area {
            padding: 12px 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        #answer {
            white-space: pre-wrap;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        #sources {
            font-size: 12px;
            color: #6b7280;
        }

        #sources .source-item {
            padding: 4px 0;
            border-top: 1px solid #f3f4f6;
        }

        #error {
            color: #ef4444;
            padding: 12px 16px;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }

        /* Token settings */
        .settings-area {
            padding: 8px 16px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
        }

        .settings-area details summary {
            cursor: pointer;
            color: #6b7280;
        }

        #token-input {
            width: 100%;
            padding: 4px 8px;
            margin-top: 4px;
            font-size: 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <h1>RAG Assistant</h1>
        <div id="status-dot" title="Daemon status"></div>
    </header>

    <div class="input-area">
        <div id="context-bar"></div>
        <form id="query-form">
            <input id="query-input" type="text" placeholder="Ask your knowledge base…" autofocus />
            <button id="submit-btn" type="submit">Ask</button>
        </form>
    </div>

    <div id="error"></div>
    <div class="results-area">
        <div id="answer"></div>
        <div id="sources"></div>
    </div>

    <div class="settings-area">
        <details>
            <summary>Settings</summary>
            <label>Daemon token:</label>
            <input id="token-input" type="text" placeholder="Paste token from ~/.pka/daemon_token" />
        </details>
    </div>

    <script src="popup.js"></script>
</body>

</html>
